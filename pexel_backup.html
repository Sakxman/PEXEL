<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Pexels Clone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #fff;
    }

    header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: transparent;
      color: white;
    }

    .logo {
      font-family: 'Pacifico', cursive;
      font-size: 28px;
      color: white;
      
    }

    nav {
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: 500;
      position: relative;
      padding: 8px;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: white;
      color: black;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      min-width: 200px;
      z-index: 1001;
    }

    .dropdown-content a {
      display: block;
      padding: 8px 12px;
      text-decoration: none;
      color: #333;
    }

    .dropdown-content a:hover {
      background-color: #f0f0f0;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .upload-btn {
      background-color: white;
      color: black;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.5s;
    }
    .upload-btn:hover {
       background-color: pink;

    }

    .hero {
      position: relative;
      height: 100vh;
      background-image: url('https://images.pexels.com/photos/374870/pexels-photo-374870.jpeg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
      max-width: 800px;
      padding: 0 20px;
    }

    .hero-content h1 {
      font-size: 38px;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      background-color: white;
      border-radius: 32px;
      padding: 6px;
      max-width: 700px;
      margin: 0 auto;
      overflow: hidden;
    }

    .search-select {
      background: transparent;
      border: none;
      font-size: 14px;
      padding: 10px;
      color: #333;
      border-right: 1px solid #ccc;
    }

    .search-input {
      flex: 1;
      border: none;
      padding: 14px;
      font-size: 16px;
      outline: none;
    }

    .search-button {
      background: none;
      border: none;
      padding: 0 16px;
      cursor: pointer;
      color: #666;
    }

    .nav-icons {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .circle-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .newhead {
        display: flex;
        background-color: #FFFFFF;
        height: 200px;
        width: 100%;
        justify-content: center;
        margin-top: 70px;
        flex-direction: row;
        gap: 40px;
    }
    .hp {
        color: #4A4A4A;
        font-size: 30px;
        font-weight: bold;
    }
    .hp:hover {
        color: red;
    }
    .headun {
        background-color: #FFFFFF;
        width: 100%;
        height: 200px;
        justify-content: space-between;
        display: flex;
        flex-direction: row;
    }
    .headun h1 {
        color: black;
        font-size: 30px;
        margin-left: 20px;
        margin-top: 40px;
    }
    .tbtn {
        border-radius: 40px;
        background-color: rgba(255, 255, 255, 1);
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.4s ease;
        margin-bottom: 80px;
        margin-right: 30px;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: minmax(100px, auto);
      gap: 20px;
